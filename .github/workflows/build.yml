# NextSSL — Multi-platform CI/CD
#
# Triggers:
#   - Push to main / master
#   - Pull request against main / master
#   - Manual via "Run workflow" button
#
# Jobs:
#   build                 : compile nextssl for every platform x arch matrix entry
#   build-macos-universal : lipo-merge x86_64 + arm64 into a fat dylib
#   collect-logs          : waits for all build jobs (pass OR fail) → downloads
#                           every log artifact → commits them all into one branch:
#                           ci-logs/<run_id>   (one branch per run, easy to pull)
#
# Artifacts (12 total):
#   nextssl-win-x86_64 / x86 / arm64
#   nextssl-linux-x86_64 / x86 / arm64 / armv7 / riscv64
#   nextssl-macos-x86_64 / arm64 / universal
#   nextssl-web-wasm32

name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Cancel in-flight runs for the same ref (saves minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ------------------------------------------------------------------------------
# Builds
# ------------------------------------------------------------------------------
jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write   # required for the "Commit logs to branch" step

    strategy:
      fail-fast: false
      matrix:
        include:

          # -- Windows ---------------------------------------------------------
          - label:      "Windows x86_64 (MSVC)"
            runner:     windows-2022
            os_tag:     win
            arch_tag:   x86_64
            cmake_arch: x64
            toolchain:  msvc
            shared:     ON

          - label:      "Windows x86 / i686 (MSVC)"
            runner:     windows-2022
            os_tag:     win
            arch_tag:   x86
            cmake_arch: Win32
            toolchain:  msvc
            shared:     ON

          - label:      "Windows arm64 (MSVC cross)"
            runner:     windows-2022
            os_tag:     win
            arch_tag:   arm64
            cmake_arch: ARM64
            toolchain:  msvc
            shared:     ON

          # -- Linux glibc native ----------------------------------------------
          - label:      "Linux x86_64 (GCC)"
            runner:     ubuntu-22.04
            os_tag:     linux
            arch_tag:   x86_64
            toolchain:  native
            apt_extra:  ""
            cross_args: ""
            shared:     ON

          - label:      "Linux x86 / i686 (GCC -m32)"
            runner:     ubuntu-22.04
            os_tag:     linux
            arch_tag:   x86
            toolchain:  native-m32
            apt_extra:  "gcc-multilib"
            cross_args: "-DCMAKE_C_FLAGS=-m32 -DCMAKE_SYSTEM_PROCESSOR=i686"
            shared:     ON

          # -- Linux glibc cross -----------------------------------------------
          - label:      "Linux arm64 / AArch64 (cross)"
            runner:     ubuntu-22.04
            os_tag:     linux
            arch_tag:   arm64
            toolchain:  cross
            apt_extra:  "gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross"
            cross_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY
            shared:     ON

          - label:      "Linux armv7hf (cross)"
            runner:     ubuntu-22.04
            os_tag:     linux
            arch_tag:   armv7
            toolchain:  cross
            apt_extra:  "gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf libc6-dev-armhf-cross"
            cross_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=armv7
              -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY
            shared:     ON

          - label:      "Linux riscv64 (cross)"
            runner:     ubuntu-22.04
            os_tag:     linux
            arch_tag:   riscv64
            toolchain:  cross
            apt_extra:  "gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu libc6-dev-riscv64-cross"
            cross_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=riscv64
              -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY
            shared:     ON

          # -- macOS -----------------------------------------------------------
          - label:      "macOS x86_64 (Apple Clang)"
            runner:     macos-13
            os_tag:     macos
            arch_tag:   x86_64
            toolchain:  native
            shared:     ON

          - label:      "macOS arm64 / M-series (Apple Clang)"
            runner:     macos-14
            os_tag:     macos
            arch_tag:   arm64
            toolchain:  native
            shared:     ON

          # -- WebAssembly -----------------------------------------------------
          - label:      "WASM (Emscripten)"
            runner:     ubuntu-22.04
            os_tag:     web
            arch_tag:   wasm32
            toolchain:  emscripten
            shared:     ON

    steps:
      - uses: actions/checkout@v4

      # ========================================================================
      # FIRST thing after checkout: create the log directory so it exists even
      # if every downstream step fails before it would normally create it.
      # Also write basic job metadata so there is always at least one file.
      # ========================================================================
      - name: Initialize log directory
        if: always()
        shell: bash
        run: |
          LOG="logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}"
          mkdir -p "$LOG"
          printf 'label:    %s\n' "${{ matrix.label }}"  > "$LOG/job_info.txt"
          printf 'run_id:   %s\n' "${{ github.run_id }}" >> "$LOG/job_info.txt"
          printf 'attempt:  %s\n' "${{ github.run_attempt }}" >> "$LOG/job_info.txt"
          printf 'sha:      %s\n' "${{ github.sha }}"    >> "$LOG/job_info.txt"
          printf 'ref:      %s\n' "${{ github.ref }}"    >> "$LOG/job_info.txt"
          printf 'started:  %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$LOG/job_info.txt"

      # ========================================================================
      # Every step that writes logs uses this path:
      #   logs/<os_tag>/<arch_tag>/
      # This keeps per-platform/variant logs separated even if artifacts are
      # merged, and makes it obvious which job produced which log.
      # ========================================================================

      # -- Linux: system packages ----------------------------------------------
      - name: Install Linux build packages
        if: runner.os == 'Linux' && matrix.toolchain != 'emscripten'
        shell: bash
        run: |
          echo "::group::Setup — ${{ matrix.label }}"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ccache ${{ matrix.apt_extra }}
          echo "::endgroup::"

      # -- macOS: cmake + ninja + ccache ---------------------------------------
      - name: Install macOS build packages
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "::group::Setup — ${{ matrix.label }}"
          for pkg in cmake ninja ccache; do
            brew upgrade "$pkg" 2>/dev/null || brew install "$pkg"
          done
          echo "::endgroup::"

      # -- WASM: system packages + Emscripten SDK ------------------------------
      - name: Install WASM build packages
        if: matrix.toolchain == 'emscripten'
        shell: bash
        run: |
          echo "::group::Setup — ${{ matrix.label }}"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build ccache
          echo "::endgroup::"

      - name: Set up Emscripten SDK
        if: matrix.toolchain == 'emscripten'
        uses: mymindstorm/setup-emsdk@v14
        continue-on-error: false
        with:
          version: latest
          actions-cache-folder: .emsdk-cache

      # -- Windows: install Ninja via Chocolatey (no third-party action needed)
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "::group::Setup — ${{ matrix.label }}"
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes --no-progress
          }
          Write-Host "::endgroup::"

      # ========================================================================
      # Compiler cache
      # Cache key:     runner.os + arch_tag + hash(CMakeLists + src)
      # Restore-keys:  fall back to same OS/arch, then OS only so all jobs on the
      #                same runner OS share a cache pool and seed each other.
      # continue-on-error: true so a cache service hiccup never fails a build.
      # ========================================================================

      - name: Cache ccache (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch_tag }}-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch_tag }}-
            ccache-${{ runner.os }}-

      - name: Configure ccache limits
        if: runner.os != 'Windows'
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache sccache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ${{ env.LOCALAPPDATA }}\Mozilla\sccache
          key: sccache-win-${{ matrix.arch_tag }}-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h') }}
          restore-keys: |
            sccache-win-${{ matrix.arch_tag }}-
            sccache-win-

      # sccache is pre-installed on windows-2022 runners; --start-server is
      # idempotent (exits 0 even if already running).
      - name: Start sccache server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --start-server
            Write-Host "sccache server started"
          } else {
            Write-Host "sccache not found — compiler caching disabled for this job"
          }

      # ========================================================================
      # CMake configure — routed through ci_wrapper.py:
      #   • output teed to logs/<os>/<arch>/configure.log
      #   • ::group:: / ::endgroup:: for collapsible CI output
      #   • ci_wrapper ALWAYS exits 0; failures are recorded in the log only
      # ========================================================================

      - name: Configure (Windows MSVC)
        if: matrix.toolchain == 'msvc'
        shell: pwsh
        run: |
          $logDir = "logs\${{ matrix.os_tag }}\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $logDir | Out-Null
          $launcher = if (Get-Command sccache -ErrorAction SilentlyContinue) { "sccache" } else { "" }
          $cmakeArgs = @("-S", ".", "-B", "_build", "-A", "${{ matrix.cmake_arch }}",
                         "-DCMAKE_BUILD_TYPE=Release", "-DNEXTSSL_SHARED=${{ matrix.shared }}")
          if ($launcher) { $cmakeArgs += "-DCMAKE_C_COMPILER_LAUNCHER=$launcher" }
          $wrapArgs = @("build/ci_wrapper.py",
                        "--group", "Configure — ${{ matrix.label }}",
                        "--log",   "$logDir\configure.log",
                        "--") + @("cmake") + $cmakeArgs
          python @wrapArgs

      - name: Configure (Linux / macOS)
        if: matrix.toolchain != 'msvc' && matrix.toolchain != 'emscripten'
        shell: bash
        run: |
          python build/ci_wrapper.py \
            --group "Configure — ${{ matrix.label }}" \
            --log   "logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}/configure.log" \
            -- cmake -S . -B _build -G Ninja \
               -DCMAKE_BUILD_TYPE=Release \
               -DNEXTSSL_SHARED=${{ matrix.shared }} \
               -DCMAKE_C_COMPILER_LAUNCHER=ccache \
               ${{ matrix.cross_args }}

      - name: Configure (WASM)
        if: matrix.toolchain == 'emscripten'
        shell: bash
        run: |
          python build/ci_wrapper.py \
            --group "Configure — ${{ matrix.label }}" \
            --log   "logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}/configure.log" \
            -- emcmake cmake -S . -B _build -G Ninja \
               -DCMAKE_BUILD_TYPE=Release \
               -DNEXTSSL_SHARED=${{ matrix.shared }} \
               -DCMAKE_C_COMPILER_LAUNCHER=ccache \
               -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="${{ github.workspace }}/bin/web" \
               -DCMAKE_LIBRARY_OUTPUT_DIRECTORY="${{ github.workspace }}/bin/web"

      # ========================================================================
      # Build — routed through ci_wrapper.py (same guarantees as configure)
      # -k 0 (Ninja keep-going) ensures ALL errors are logged in one pass.
      # ========================================================================

      - name: Build (MSVC)
        if: matrix.toolchain == 'msvc'
        shell: pwsh
        run: |
          $logDir = "logs\${{ matrix.os_tag }}\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $logDir | Out-Null
          python build/ci_wrapper.py `
            --group "Build — ${{ matrix.label }}" `
            --log   "$logDir\build.log" `
            -- cmake --build _build --config Release --parallel

      - name: Build (non-MSVC)
        if: matrix.toolchain != 'msvc'
        shell: bash
        run: |
          python build/ci_wrapper.py \
            --group "Build — ${{ matrix.label }}" \
            --log   "logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}/build.log" \
            -- cmake --build _build --parallel -- -k 0

      # ========================================================================
      # Post-build
      # ========================================================================

      - name: Show ccache stats
        if: runner.os != 'Windows'
        run: ccache -s

      - name: Show sccache stats
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) { sccache --show-stats }

      # Normalise output directory: CMakeLists.txt names the dir from
      # CMAKE_SYSTEM_PROCESSOR which may differ from our arch_tag for cross builds.
      - name: Normalise output directory
        if: runner.os != 'Windows'
        shell: bash
        run: |
          DST="bin/${{ matrix.os_tag }}/${{ matrix.arch_tag }}"
          SRC=$(find bin -mindepth 2 -maxdepth 2 -type d 2>/dev/null | head -1)
          if [ -n "$SRC" ] && [ "$SRC" != "$DST" ]; then
            mkdir -p "$DST"
            cp -r "$SRC"/. "$DST/"
          fi

      # ========================================================================
      # Log collection — runs ALWAYS (success or failure)
      # Collects: cmake internal logs, compiler cache stats, tool versions.
      # Stored under logs/<os_tag>/<arch_tag>/ alongside configure/build logs.
      # ========================================================================

      - name: Collect logs (Linux / macOS / WASM)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          LOG="logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}"
          mkdir -p "$LOG"

          # CMake internal logs
          for f in \
            _build/CMakeFiles/CMakeError.log \
            _build/CMakeFiles/CMakeOutput.log \
            _build/CMakeFiles/cmake.check_cache; do
            [ -f "$f" ] && cp "$f" "$LOG/$(basename $f)" || true
          done

          # Compiler cache stats
          if command -v ccache &>/dev/null; then
            ccache -s > "$LOG/ccache_stats.txt" 2>&1 || true
          fi

          # Environment snapshot
          {
            printf '=== cmake ===\n'; cmake --version 2>&1 || echo n/a
            printf '\n=== ninja ===\n'; ninja --version 2>&1 || echo n/a
            printf '\n=== cc ===\n'; ${CC:-cc} --version 2>&1 | head -3 || echo n/a
            printf '\n=== uname ===\n'; uname -a
            printf '\n=== env ===\n'
            env | grep -E 'CC=|CXX=|CMAKE|PATH=' | sort
          } > "$LOG/env.txt" 2>&1 || true

      - name: Collect logs (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $logDir = "logs\${{ matrix.os_tag }}\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $logDir | Out-Null

          # CMake internal logs
          foreach ($f in @(
            "_build\CMakeFiles\CMakeError.log",
            "_build\CMakeFiles\CMakeOutput.log",
            "_build\CMakeFiles\cmake.check_cache"
          )) {
            if (Test-Path $f) { Copy-Item $f $logDir\ }
          }

          # sccache stats
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats 2>&1 | Out-File "$logDir\sccache_stats.txt" -Encoding utf8
          }

          # Environment snapshot
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("=== cmake ===")
          try   { $lines.Add((cmake --version 2>&1 | Out-String).Trim()) }
          catch { $lines.Add("cmake: not found") }
          $lines.Add("`n=== cl ===")
          if (Get-Command cl -ErrorAction SilentlyContinue) {
            try   { $lines.Add((cl 2>&1 | Select-Object -First 1 | Out-String).Trim()) }
            catch { $lines.Add("cl: error querying version") }
          } else {
            $lines.Add("cl not in PATH (normal for ARM64 cross jobs)")
          }
          $lines.Add("`n=== os ===")
          $lines.Add([System.Environment]::OSVersion.ToString())
          $lines.Add("`n=== env ===")
          Get-ChildItem Env: | Where-Object { $_.Name -match 'CC|CXX|CMAKE|PATH' } |
            ForEach-Object { $lines.Add("$($_.Name)=$($_.Value)") }
          $lines | Out-File "$logDir\env.txt" -Encoding utf8

      # ========================================================================
      # Artifact uploads — binary (only on success) + logs (always)
      # ========================================================================

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextssl-${{ matrix.os_tag }}-${{ matrix.arch_tag }}
          path: bin/${{ matrix.os_tag }}/${{ matrix.arch_tag }}/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os_tag }}-${{ matrix.arch_tag }}
          path: logs/${{ matrix.os_tag }}/${{ matrix.arch_tag }}/
          retention-days: 30
          if-no-files-found: warn

# ------------------------------------------------------------------------------
# macOS Universal (fat) binary -- merged from x86_64 + arm64 artifacts
# ------------------------------------------------------------------------------
  build-macos-universal:
    name: Build macOS universal (fat)
    needs: build
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: nextssl-macos-x86_64
          path: _fat/x86_64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: nextssl-macos-arm64
          path: _fat/arm64

      - name: Create universal binary with lipo
        run: |
          mkdir -p bin/macos/universal
          lipo -create \
            _fat/x86_64/libnextssl.dylib \
            _fat/arm64/libnextssl.dylib \
            -output bin/macos/universal/libnextssl.dylib
          lipo -info bin/macos/universal/libnextssl.dylib

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextssl-macos-universal
          path: bin/macos/universal/
          if-no-files-found: ignore
          retention-days: 30
