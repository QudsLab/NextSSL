name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - logs/**
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - logs/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  win:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize Windows logs
        if: always()
        shell: pwsh
        run: |
          $logDir = "logs\win"
          New-Item -ItemType Directory -Force $logDir | Out-Null
          @(
            "platform: win",
            "run_id: ${{ github.run_id }}",
            "attempt: ${{ github.run_attempt }}",
            "sha: ${{ github.sha }}",
            "ref: ${{ github.ref }}"
          ) | Out-File "$logDir\job_info.txt" -Encoding utf8

      - name: Build variants with Python runner
        shell: pwsh
        run: |
          $log = "logs\win\bootstrap.log"
          python --version 2>&1 | Tee-Object -FilePath $log
          python build/ci_runner.py --platform win --variants x86_64 x86 arm64 --jobs 4 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload binaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextssl-win
          path: bin/win/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-win
          path: logs/win/
          retention-days: 30
          if-no-files-found: error

  linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize Linux logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs/linux
          cat > logs/linux/job_info.txt <<'EOF'
          platform: linux
          run_id: ${{ github.run_id }}
          attempt: ${{ github.run_attempt }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          EOF

      - name: Install Linux toolchains
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update 2>&1 | tee -a logs/linux/bootstrap.log
          sudo apt-get install -y \
            cmake ninja-build ccache \
            gcc g++ gcc-multilib g++-multilib \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf binutils-arm-linux-gnueabihf libc6-dev-armhf-cross \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu binutils-riscv64-linux-gnu libc6-dev-riscv64-cross 2>&1 | tee -a logs/linux/bootstrap.log

      - name: Build variants with Python runner
        shell: bash
        run: |
          set -euo pipefail
          python3 --version 2>&1 | tee -a logs/linux/bootstrap.log
          python3 build/ci_runner.py --platform linux --variants x86_64 x86 arm64 armv7 riscv64 --jobs 4 2>&1 | tee -a logs/linux/bootstrap.log

      - name: Upload binaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextssl-linux
          path: bin/linux/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-linux
          path: logs/linux/
          retention-days: 30
          if-no-files-found: error

  macos:
    name: Build macOS
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize macOS logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs/macos
          cat > logs/macos/job_info.txt <<'EOF'
          platform: macos
          run_id: ${{ github.run_id }}
          attempt: ${{ github.run_attempt }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          EOF

      - name: Install macOS build tools
        shell: bash
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake 2>&1 | tee -a logs/macos/bootstrap.log
          brew list ninja >/dev/null 2>&1 || brew install ninja 2>&1 | tee -a logs/macos/bootstrap.log
          brew list ccache >/dev/null 2>&1 || brew install ccache 2>&1 | tee -a logs/macos/bootstrap.log

      - name: Build variants with Python runner
        shell: bash
        run: |
          set -euo pipefail
          python3 --version 2>&1 | tee -a logs/macos/bootstrap.log
          python3 build/ci_runner.py --platform macos --variants x86_64 arm64 --jobs 4 2>&1 | tee -a logs/macos/bootstrap.log

      - name: Upload binaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextssl-macos
          path: bin/macos/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-macos
          path: logs/macos/
          retention-days: 30
          if-no-files-found: error

  wasm:
    name: Build WASM
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize WASM logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs/wasm
          cat > logs/wasm/job_info.txt <<'EOF'
          platform: wasm
          run_id: ${{ github.run_id }}
          attempt: ${{ github.run_attempt }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          EOF

      - name: Install Emscripten and build variants
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update 2>&1 | tee -a logs/wasm/bootstrap.log
          sudo apt-get install -y cmake ninja-build git python3 2>&1 | tee -a logs/wasm/bootstrap.log
          git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk" 2>&1 | tee -a logs/wasm/bootstrap.log
          "$RUNNER_TEMP/emsdk/emsdk" install latest 2>&1 | tee -a logs/wasm/bootstrap.log
          "$RUNNER_TEMP/emsdk/emsdk" activate latest 2>&1 | tee -a logs/wasm/bootstrap.log
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          python3 build/ci_runner.py --platform wasm --variants wasm32 --jobs 4 2>&1 | tee -a logs/wasm/bootstrap.log

      - name: Upload binaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextssl-wasm
          path: bin/wasm/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-wasm
          path: logs/wasm/
          retention-days: 30
          if-no-files-found: error

  collect:
    name: Collect and publish logs
    needs: [win, linux, macos, wasm]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all log artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: logs-*
          path: _ci_logs_artifacts/
          merge-multiple: false

      - name: Normalize log layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf merged-logs
          mkdir -p merged-logs

          declare -A targets=(
            [logs-win]=win
            [logs-linux]=linux
            [logs-macos]=macos
            [logs-wasm]=wasm
          )

          for artifact in "${!targets[@]}"; do
            source_dir="_ci_logs_artifacts/$artifact"
            target_dir="merged-logs/${targets[$artifact]}"
            if [ -d "$source_dir" ]; then
              mkdir -p "$target_dir"
              cp -R "$source_dir/." "$target_dir/"
            fi
          done

      - name: Upload all-logs
        uses: actions/upload-artifact@v7
        with:
          name: all-logs
          path: merged-logs/
          retention-days: 30
          if-no-files-found: error

      - name: Publish logs to main branch
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git switch -C main origin/main

          rm -rf logs
          mkdir -p logs
          cp -R merged-logs/. logs/

          git add logs
          if git diff --cached --quiet; then
            echo "No log changes to commit"
          else
            git commit -m "CI logs for run ${{ github.run_id }}"
            git push origin HEAD:main
          fi

      - name: Write pull instructions
        shell: bash
        run: |
          {
            echo "## Pullable logs"
            echo
            echo "Logs are published to branch: main"
            echo
            echo "Commands:"
            echo "git fetch origin main"
            echo "git switch main"
            echo
            echo "Logs path: logs/<platform>/<variant>/"
            echo
            echo "Fallback artifact: all-logs"
          } >> "$GITHUB_STEP_SUMMARY"