name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - logs/**
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - logs/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: windows-2022
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - label:      "Windows x86_64"
            arch_tag:   x86_64
            cmake_arch: x64

          - label:      "Windows x86"
            arch_tag:   x86
            cmake_arch: Win32

          - label:      "Windows arm64"
            arch_tag:   arm64
            cmake_arch: ARM64

    steps:
      - uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # Log dir — created first so it always exists even if later steps crash
      # -----------------------------------------------------------------------
      - name: Init log directory
        if: always()
        shell: pwsh
        run: |
          $log = "logs\win\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $log | Out-Null
          @(
            "label:    ${{ matrix.label }}",
            "run_id:   ${{ github.run_id }}",
            "attempt:  ${{ github.run_attempt }}",
            "sha:      ${{ github.sha }}",
            "ref:      ${{ github.ref }}",
            "started:  $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)"
          ) | Out-File "$log\job_info.txt" -Encoding utf8

      # -----------------------------------------------------------------------
      # Ninja — pre-installed on windows-2022 via VS, choco fallback
      # -----------------------------------------------------------------------
      - name: Ensure Ninja available
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --yes --no-progress
          } else {
            Write-Host "ninja $(ninja --version)"
          }

      # -----------------------------------------------------------------------
      # sccache compiler cache
      # -----------------------------------------------------------------------
      - name: Cache sccache store
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ${{ env.LOCALAPPDATA }}\Mozilla\sccache
          key: sccache-win-${{ matrix.arch_tag }}-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h') }}
          restore-keys: |
            sccache-win-${{ matrix.arch_tag }}-
            sccache-win-

      - name: Start sccache server
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --start-server
            Write-Host "sccache started"
          } else {
            Write-Host "sccache not available - skipping compiler cache"
          }

      # -----------------------------------------------------------------------
      # Configure — real exit code, job turns red on failure
      # -----------------------------------------------------------------------
      - name: Configure
        shell: pwsh
        run: |
          $log = "logs\win\${{ matrix.arch_tag }}"
          $launcher = if (Get-Command sccache -ErrorAction SilentlyContinue) { "sccache" } else { $null }

          $cmakeArgs = @(
            "-S", ".",
            "-B", "_build",
            "-A", "${{ matrix.cmake_arch }}",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DNEXTSSL_SHARED=ON"
          )
          if ($launcher) { $cmakeArgs += "-DCMAKE_C_COMPILER_LAUNCHER=$launcher" }

          Write-Host "::group::Configure - ${{ matrix.label }}"
          cmake @cmakeArgs 2>&1 | Tee-Object -FilePath "$log\configure.log"
          $exitCode = $LASTEXITCODE
          Write-Host "::endgroup::"

          foreach ($f in @("_build\CMakeFiles\CMakeError.log", "_build\CMakeFiles\CMakeOutput.log")) {
            if (Test-Path $f) { Copy-Item $f "$log\" -Force }
          }

          if ($exitCode -ne 0) {
            Write-Host "::error::Configure failed (exit $exitCode)"
            exit $exitCode
          }

      # -----------------------------------------------------------------------
      # Build — real exit code
      # -----------------------------------------------------------------------
      - name: Build
        shell: pwsh
        run: |
          $log = "logs\win\${{ matrix.arch_tag }}"

          Write-Host "::group::Build - ${{ matrix.label }}"
          cmake --build _build --config Release --parallel 2>&1 | Tee-Object -FilePath "$log\build.log"
          $exitCode = $LASTEXITCODE
          Write-Host "::endgroup::"

          if ($exitCode -ne 0) {
            Write-Host "::error::Build failed (exit $exitCode)"
            exit $exitCode
          }

      # -----------------------------------------------------------------------
      # Copy output to bin/win/<arch>/
      # -----------------------------------------------------------------------
      - name: Collect binary
        shell: pwsh
        run: |
          $dst = "bin\win\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $dst | Out-Null
          $files = Get-ChildItem "_build" -Recurse -Include "*.dll","*.lib","*.pdb" -ErrorAction SilentlyContinue
          foreach ($f in $files) { Copy-Item $f.FullName $dst\ -Force }
          Write-Host "Collected $($files.Count) file(s) to $dst"

      # -----------------------------------------------------------------------
      # Collect logs — always, captures sccache stats + env snapshot
      # -----------------------------------------------------------------------
      - name: Collect logs
        if: always()
        shell: pwsh
        run: |
          $log = "logs\win\${{ matrix.arch_tag }}"
          New-Item -ItemType Directory -Force $log | Out-Null

          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats 2>&1 | Out-File "$log\sccache_stats.txt" -Encoding utf8
          }

          $cmakeVer = try { (cmake --version 2>&1 | Out-String).Trim() } catch { "cmake: not found" }
          $clVer    = try { (cl 2>&1 | Select-Object -First 1 | Out-String).Trim() } catch { "cl: not found" }
          $envVars  = Get-ChildItem Env: |
                        Where-Object { $_.Name -match 'CC|CXX|CMAKE|PATH|MSVC|VCTools' } |
                        ForEach-Object { "$($_.Name)=$($_.Value)" }
          @(
            "=== cmake ===", $cmakeVer, "",
            "=== cl ===",    $clVer,    "",
            "=== os ===",    [System.Environment]::OSVersion.ToString(), "",
            "=== env ===",   ($envVars | Out-String).Trim()
          ) | Out-File "$log\env.txt" -Encoding utf8

      # -----------------------------------------------------------------------
      # Artifacts
      #   bin  — only on success (nothing to upload if build failed)
      #   logs — always, mandatory (if-no-files-found: error so we notice)
      # -----------------------------------------------------------------------
      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: nextssl-win-${{ matrix.arch_tag }}
          path: bin/win/${{ matrix.arch_tag }}/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-win-${{ matrix.arch_tag }}
          path: logs/win/${{ matrix.arch_tag }}/
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # collect — runs after all build jobs, always.
  # Downloads every logs-win-* artifact and merges into ONE download: all-logs
  # This is the only artifact you need to pull to inspect a full run.
  # ---------------------------------------------------------------------------
  collect:
    name: Collect and publish logs
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all log artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: logs-win-*
          path: _ci_logs_artifacts/
          merge-multiple: false

      - name: Upload all-logs
        uses: actions/upload-artifact@v7
        with:
          name: all-logs
          path: _ci_logs_artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Publish logs to main branch
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git switch -C main origin/main

          mkdir -p "logs/runs/${{ github.run_id }}" "logs/latest"
          rm -rf logs/latest/*

          cp -R _ci_logs_artifacts/. "logs/runs/${{ github.run_id }}/"
          cp -R _ci_logs_artifacts/. "logs/latest/"

          cat > "logs/latest/RUN_INFO.txt" <<EOF
          run_id:   ${{ github.run_id }}
          attempt:  ${{ github.run_attempt }}
          sha:      ${{ github.sha }}
          ref:      ${{ github.ref }}
          branch:   main
          EOF

          cat > "logs/runs/${{ github.run_id }}/RUN_INFO.txt" <<EOF
          run_id:   ${{ github.run_id }}
          attempt:  ${{ github.run_attempt }}
          sha:      ${{ github.sha }}
          ref:      ${{ github.ref }}
          branch:   main
          EOF

          git add logs
          if git diff --cached --quiet; then
            echo "No log changes to commit"
          else
            git commit -m "CI logs for run ${{ github.run_id }}"
            git push origin HEAD:main
          fi

      - name: Write pull instructions
        shell: bash
        run: |
          {
            echo "## Pullable logs"
            echo
            echo "Logs are published to branch: main"
            echo
            echo "Commands:"
            echo "git fetch origin main"
            echo "git switch main"
            echo
            echo "Latest logs path: logs/latest/"
            echo "Run logs path: logs/runs/${{ github.run_id }}/"
            echo
            echo "Fallback artifact: all-logs"
          } >> "$GITHUB_STEP_SUMMARY"
