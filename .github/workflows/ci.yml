            --action-log logs/action/mac/partial/core.log
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-mac-partial-core-${{ github.run_attempt }}
          path: |
            bin/${{ env.BIN_DIR }}/partial/
            logs/action/mac/partial/core.log
          if-no-files-found: warn
      - name: Cancel run on failure
        if: failure()
        shell: bash
        run: |
          gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mac_partial_pqc:
    runs-on: macos-latest
    needs: guard
    if: >-
      needs.guard.outputs.gen == 'true' &&
      (needs.guard.outputs.gen_platforms == 'all' ||
