  # ───────────────── WEB: base / main / system tiers ────────────────────────

  web_base:
    runs-on: ubuntu-latest
    needs: [ web_partial_hash, web_partial_core, web_partial_pqc,
             web_partial_pow, web_partial_dhcm ]
    if: >-
      needs.web_partial_hash.result   == 'success' &&
      needs.web_partial_core.result   == 'success' &&
      needs.web_partial_pqc.result    == 'success' &&
      needs.web_partial_pow.result    == 'success' &&
      needs.web_partial_dhcm.result   == 'success'
    env:
      PLATFORM: web
      BIN_DIR: web
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
