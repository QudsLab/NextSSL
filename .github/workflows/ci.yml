  mac_base:
    runs-on: macos-latest
    needs: [ mac_partial_hash, mac_partial_core, mac_partial_pqc,
             mac_partial_pow, mac_partial_dhcm ]
    if: >-
      needs.mac_partial_hash.result  == 'success' &&
      needs.mac_partial_core.result  == 'success' &&
      needs.mac_partial_pqc.result   == 'success' &&
      needs.mac_partial_pow.result   == 'success' &&
      needs.mac_partial_dhcm.result  == 'success'
    env:
      PLATFORM: mac
      BIN_DIR: mac
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install GCC
        run: brew list gcc >/dev/null 2>&1 || brew install gcc
      - name: Download partial artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true
          if-no-files-found: ignore
      - name: Build and Test base
        run: |
          for mod in core hash dhcm pow pqc; do
            python runner.py --platform $PLATFORM --build ${mod}:base \
              --action-log logs/action/mac/base/${mod}.log
            python runner.py --platform $PLATFORM --test ${mod}:base \
              --load-mode ${{ env.LOAD_MODE }} \
              --action-log logs/action/mac/base/${mod}.log
          done
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
