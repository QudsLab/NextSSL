# NextSSL CI — Build, Test & Release
#
# Guard rule: nothing runs unless:
#   - the commit message contains '--gen' (push), OR
#   - the workflow is triggered manually (workflow_dispatch)
#
# Flag reference:
#   --gen [platform]         Build all or one platform; commit bins
#   --genAll                 Override load mode → genAll (--fullTest)
#   --genQuick               Override load mode → genQuick (--quickTest)
#   --genRelease [tag]       Implies --gen all; creates GitHub Release
#   --skipTest               Skip --test step
#   --noLog                  Forward --noLog to runner.py

name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Comma-separated platforms (web,linux,mac,windows)"
        required: false
        default: "web,linux,mac,windows"
      tiers:
        description: "Comma-separated tiers (partial,base,main,system)"
        required: false
        default: "partial,base,main,system"
      load_mode:
        description: "Load mode: gen | genAll | genQuick"
        required: false
        default: "gen"

env:
  SOURCE_DATE_EPOCH: 0
  TZ: UTC
  LOAD_MODE: >-
    ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.load_mode != '' && github.event.inputs.load_mode) ||
        (contains(github.event.head_commit.message, '--genAll') && 'genAll') ||
        (contains(github.event.head_commit.message, '--genQuick') && 'genQuick') ||
        'gen' }}

# ─────────────────────────────────────────────────────────────────────────────
# Helper macros (reused in every job)
# ─────────────────────────────────────────────────────────────────────────────

# Shared checkout step config
x-checkout: &checkout
  uses: actions/checkout@v4
  with:
    fetch-depth: 1

# ─────────────────────────────────────────────────────────────────────────────
# guard — parse commit message; gate all downstream jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  guard:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '--gen')
    outputs:
      gen:           ${{ steps.resolve.outputs.gen }}
      gen_platforms: ${{ steps.resolve.outputs.gen_platforms }}
      gen_release:   ${{ steps.resolve.outputs.gen_release }}
      load_mode:     ${{ steps.resolve.outputs.load_mode }}
      skip_test:     ${{ steps.resolve.outputs.skip_test }}
      no_log:        ${{ steps.resolve.outputs.no_log }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: parse
        run: |
          python script/ci/commit_parser.py \
            "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
      - id: resolve
        shell: bash
        run: |
          GEN_RELEASE="${{ steps.parse.outputs.gen_release }}"
          if [ "$GEN_RELEASE" = "auto" ]; then
            GEN_RELEASE=$(python script/ci/gen_dev_tag.py --src-dir src)
          fi
          # workflow_dispatch always generates
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "gen=true"                                               >> $GITHUB_OUTPUT
            echo "gen_platforms=${{ github.event.inputs.platforms || 'web,linux,mac,windows' }}" >> $GITHUB_OUTPUT
          else
            echo "gen=${{ steps.parse.outputs.gen }}"                    >> $GITHUB_OUTPUT
            echo "gen_platforms=${{ steps.parse.outputs.gen_platforms }}" >> $GITHUB_OUTPUT
          fi
          echo "gen_release=$GEN_RELEASE"                                >> $GITHUB_OUTPUT
          echo "load_mode=${{ steps.parse.outputs.load_mode }}"          >> $GITHUB_OUTPUT
          echo "skip_test=${{ steps.parse.outputs.skip_test }}"          >> $GITHUB_OUTPUT
          echo "no_log=${{ steps.parse.outputs.no_log }}"                >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Platform conditional helpers (inline expressions)
  # ─────────────────────────────────────────────────────────────────────────
  # Each job uses a platform+tier conditional guard for workflow_dispatch.
  # For push events only committed platforms run (via gen_platforms output).

  # ───────────────── WEB: partial tier ─────────────────────────────────────

  web_partial_hash:
    runs-on: ubuntu-latest
    needs: guard
    if: >-
      needs.guard.outputs.gen == 'true' &&
      (needs.guard.outputs.gen_platforms == 'all' ||
       contains(needs.guard.outputs.gen_platforms, 'web'))
    env:
      PLATFORM: web
      BIN_DIR: web
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: |
            emsdk
            ~/.emscripten_cache
          key: emsdk-${{ runner.os }}-3.1.60
      - name: Cache wasmtime
        uses: actions/cache@v4
        with:
          path: ~/.wasmtime
          key: wasmtime-${{ runner.os }}-v1
      - name: Setup Emscripten
        run: |
          if [ ! -d emsdk ]; then git clone https://github.com/emscripten-core/emsdk.git; fi
          cd emsdk && ./emsdk install 3.1.60 && ./emsdk activate 3.1.60
          echo "EMSDK=$PWD"                  >> $GITHUB_ENV
          echo "EM_CONFIG=$PWD/.emscripten"  >> $GITHUB_ENV
          echo "$PWD"                        >> $GITHUB_PATH
          echo "$PWD/upstream/emscripten"    >> $GITHUB_PATH
      - name: Setup wasmtime
        run: |
          if [ ! -d "$HOME/.wasmtime/bin" ]; then
            curl https://wasmtime.dev/install.sh -sSf | bash
          fi
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - name: Build and Test
        run: |
          NOLOG="${{ needs.guard.outputs.no_log == 'true' && '--noLog' || '' }}"
          SKIP="${{ needs.guard.outputs.skip_test }}"
          python runner.py --platform $PLATFORM --build hash:partial \
            --action-log logs/action/web/partial/hash.log $NOLOG
          if [ "$SKIP" != "true" ]; then
            python runner.py --platform $PLATFORM --test hash:partial \
              --load-mode ${{ env.LOAD_MODE }} \
              --action-log logs/action/web/partial/hash.log $NOLOG
          fi
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-web-partial-hash-${{ github.run_attempt }}
          path: |
            bin/${{ env.BIN_DIR }}/partial/
            logs/action/web/partial/hash.log
          if-no-files-found: warn
      - name: Cancel run on failure
        if: failure()
        shell: bash
        run: |
          gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  web_partial_core:
    runs-on: ubuntu-latest
