name: Test

on:
  push:
    branches: [main, master]
    paths-ignore:
      - logs/**
      - bin/**
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No flag gate — every trigger runs all jobs.
# Build workflow has its own -B gate; tests run whenever this workflow fires.

jobs:

  # ===========================================================================
  # WINDOWS — windows-2022 runner
  # x86_64-msvc and x86_64-mingw: native KAT execution
  # arm64-msvc and armv7-msvc: PE header check only (cannot exec cross-arch)
  # ===========================================================================

  test_win_x86_64_msvc:
    name: Test win x86_64-msvc
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__x86_64-msvc
          path: _art
      - name: Run KATs
        shell: bash
        run: |
          mkdir -p logs/test/win/x86_64-msvc
          LIB=$(find _art -name "*.dll" | head -1)
          python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/win/x86_64-msvc/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__x86_64-msvc
          path: logs/test/win/x86_64-msvc/
          retention-days: 30
          if-no-files-found: warn

  test_win_x86_msvc:
    name: Test win x86-msvc
    needs: [test_win_x86_64_msvc]
    if: always()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__x86-msvc
          path: _art
      - name: Run KATs
        shell: bash
        run: |
          mkdir -p logs/test/win/x86-msvc
          LIB=$(find _art -name "*.dll" | head -1)
          python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/win/x86-msvc/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__x86-msvc
          path: logs/test/win/x86-msvc/
          retention-days: 30
          if-no-files-found: warn

  test_win_arm64_msvc:
    name: Test win arm64-msvc (PE header check)
    needs: [test_win_x86_msvc]
    if: always()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__arm64-msvc
          path: _art
      - name: Verify PE binary
        shell: bash
        run: |
          mkdir -p logs/test/win/arm64-msvc
          LIB=$(find _art -name "*.dll" | head -1)
          python -c "
          from pathlib import Path; p=Path('$LIB')
          assert p.exists() and p.stat().st_size > 0
          assert p.read_bytes()[:2]==b'MZ', 'Not PE'
          print('OK (PE verified, execution skipped on x86_64 runner):', p.name)
          " 2>&1 | tee logs/test/win/arm64-msvc/header.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__arm64-msvc
          path: logs/test/win/arm64-msvc/
          retention-days: 30
          if-no-files-found: warn

  test_win_x86_64_mingw:
    name: Test win x86_64-mingw
    needs: [test_win_arm64_msvc]
    if: always()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__x86_64-mingw
          path: _art
      - name: Run KATs
        shell: bash
        run: |
          mkdir -p logs/test/win/x86_64-mingw
          LIB=$(find _art -name "*.dll" | head -1)
          python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/win/x86_64-mingw/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__x86_64-mingw
          path: logs/test/win/x86_64-mingw/
          retention-days: 30
          if-no-files-found: warn

  test_win_x86_mingw:
    name: Test win x86-mingw
    needs: [test_win_x86_64_mingw]
    if: always()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__x86-mingw
          path: _art
      - name: Run KATs
        shell: bash
        run: |
          mkdir -p logs/test/win/x86-mingw
          LIB=$(find _art -name "*.dll" | head -1)
          python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/win/x86-mingw/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__x86-mingw
          path: logs/test/win/x86-mingw/
          retention-days: 30
          if-no-files-found: warn

  test_win_armv7_msvc:
    name: Test win armv7-msvc (PE header check)
    needs: [test_win_x86_mingw]
    if: always()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__win__armv7-msvc
          path: _art
      - name: Verify PE binary
        shell: bash
        run: |
          mkdir -p logs/test/win/armv7-msvc
          LIB=$(find _art -name "*.dll" | head -1)
          python -c "
          from pathlib import Path; p=Path('$LIB')
          assert p.exists() and p.stat().st_size > 0
          assert p.read_bytes()[:2]==b'MZ', 'Not PE'
          print('OK (PE verified, ARMv7 execution skipped on x86_64 runner):', p.name)
          " 2>&1 | tee logs/test/win/armv7-msvc/header.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__win__armv7-msvc
          path: logs/test/win/armv7-msvc/
          retention-days: 30
          if-no-files-found: warn

  # ===========================================================================
  # LINUX GLIBC — ubuntu-24.04, QEMU user-mode for cross-arch
  # ===========================================================================

  test_linux_glibc_x86_64:
    name: Test linux-glibc x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__linux-glibc__x86_64
          path: _art
      - name: Run KATs (native)
        run: |
          mkdir -p logs/test/linux-glibc/x86_64
          LIB=$(find _art -name "*.so" | head -1)
          python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/linux-glibc/x86_64/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__linux-glibc__x86_64
          path: logs/test/linux-glibc/x86_64/
          retention-days: 30
          if-no-files-found: warn

  test_linux_glibc_x86:
    name: Test linux-glibc x86
    needs: [test_linux_glibc_x86_64]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Install QEMU + i386 libs
        run: sudo apt-get update -q && sudo apt-get install -y qemu-user qemu-user-static gcc-multilib libc6-i386
      - uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: nextssl__linux-glibc__x86
          path: _art
      - name: Run KATs (QEMU i386)
        run: |
          mkdir -p logs/test/linux-glibc/x86
          LIB=$(find _art -name "*.so" | head -1)
          QEMU_LD_PREFIX=/usr/i686-linux-gnu python test/run_tests.py --lib "$LIB" --verbose 2>&1 | tee logs/test/linux-glibc/x86/kat.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs__test__linux-glibc__x86
          path: logs/test/linux-glibc/x86/
          retention-days: 30
