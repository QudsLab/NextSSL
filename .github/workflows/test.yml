name: Test

on:
  push:
    branches: [main, master]
    paths-ignore:
      - logs/**
      - bin/**
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No flag gate — every trigger runs all 29 test jobs unconditionally.
# The build_run_id is forwarded when triggered by workflow_run so each
# test-variant job downloads from exactly the right build run.

jobs:

  # ===========================================================================
  # WINDOWS — windows-2022
  # ===========================================================================

  win_x86_64_msvc:
    name: Test Windows x86_64 MSVC
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: x86_64-msvc
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dll"

  win_x86_msvc:
    name: Test Windows x86 MSVC
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: x86-msvc
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dll"

  win_arm64_msvc:
    name: Test Windows arm64 MSVC
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: arm64-msvc
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: pe-header
      lib_glob: "*.dll"

  win_x86_64_mingw:
    name: Test Windows x86_64 MinGW
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: x86_64-mingw
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dll"

  win_x86_mingw:
    name: Test Windows x86 MinGW
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: x86-mingw
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dll"

  win_armv7_msvc:
    name: Test Windows armv7 MSVC
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: win
      variant: armv7-msvc
      runner: windows-2022
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: pe-header
      lib_glob: "*.dll"

  # ===========================================================================
  # LINUX GLIBC — ubuntu-24.04
  # ===========================================================================

  linux_glibc_x86_64:
    name: Test linux-glibc x86_64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: x86_64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"

  linux_glibc_x86:
    name: Test linux-glibc x86
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: x86
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      apt_packages: "qemu-user qemu-user-static gcc-multilib libc6-i386"
      qemu_ld_prefix: /usr/i686-linux-gnu

  linux_glibc_arm64:
    name: Test linux-glibc arm64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: arm64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: aarch64
      qemu_ld_prefix: /usr/aarch64-linux-gnu

  linux_glibc_armv7:
    name: Test linux-glibc armv7
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: armv7
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: arm
      qemu_ld_prefix: /usr/arm-linux-gnueabihf

  linux_glibc_riscv64:
    name: Test linux-glibc riscv64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: riscv64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: riscv64
      qemu_ld_prefix: /usr/riscv64-linux-gnu

  linux_glibc_s390x:
    name: Test linux-glibc s390x
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: s390x
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: s390x
      qemu_ld_prefix: /usr/s390x-linux-gnu

  linux_glibc_ppc64le:
    name: Test linux-glibc ppc64le
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: ppc64le
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: ppc64le
      qemu_ld_prefix: /usr/powerpc64le-linux-gnu

  linux_glibc_loongarch64:
    name: Test linux-glibc loongarch64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-glibc
      variant: loongarch64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: loongarch64
      qemu_ld_prefix: /usr/loongarch64-linux-gnu

  # ===========================================================================
  # LINUX MUSL — ubuntu-24.04
  # ===========================================================================

  linux_musl_x86_64:
    name: Test linux-musl x86_64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-musl
      variant: x86_64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      apt_packages: "musl musl-tools"

  linux_musl_arm64:
    name: Test linux-musl arm64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-musl
      variant: arm64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: aarch64

  linux_musl_armv7:
    name: Test linux-musl armv7
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: linux-musl
      variant: armv7
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: arm

  # ===========================================================================
  # macOS — macos-14 (Apple Silicon)
  # ===========================================================================

  macos_x86_64:
    name: Test macOS x86_64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: macos
      variant: x86_64
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dylib"

  macos_arm64:
    name: Test macOS arm64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: macos
      variant: arm64
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dylib"

  macos_universal:
    name: Test macOS universal
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: macos
      variant: universal
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dylib"

  # ===========================================================================
  # WASM — ubuntu-24.04
  # ===========================================================================

  wasm_emscripten:
    name: Test WASM emscripten-wasm32
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: wasm
      variant: emscripten-wasm32
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: wasm-node
      lib_glob: "*.js"

  wasm_wasi:
    name: Test WASM wasi-wasm32
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: wasm
      variant: wasi-wasm32
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: wasm-wasi
      lib_glob: "*.wasm"

  # ===========================================================================
  # ANDROID — ubuntu-24.04
  # ===========================================================================

  android_arm64_v8a:
    name: Test Android arm64-v8a
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: android
      variant: arm64-v8a
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: aarch64

  android_armeabi_v7a:
    name: Test Android armeabi-v7a
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: android
      variant: armeabi-v7a
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      qemu_arch: arm

  android_x86_64:
    name: Test Android x86_64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: android
      variant: x86_64
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"

  android_x86:
    name: Test Android x86
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: android
      variant: x86
      runner: ubuntu-24.04
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.so"
      apt_packages: "qemu-user qemu-user-static gcc-multilib libc6-i386"
      qemu_ld_prefix: /usr/i686-linux-gnu

  # ===========================================================================
  # iOS — macos-14
  # device-arm64 / sim-x86_64: Mach-O header check only (no code-sign in CI)
  # sim-arm64: native execution on the M1 macos-14 runner
  # ===========================================================================

  ios_device_arm64:
    name: Test iOS device-arm64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: ios
      variant: device-arm64
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: macho-header
      lib_glob: "*.dylib"

  ios_sim_arm64:
    name: Test iOS sim-arm64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: ios
      variant: sim-arm64
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: kat
      lib_glob: "*.dylib"

  ios_sim_x86_64:
    name: Test iOS sim-x86_64
    uses: ./.github/workflows/test-variant.yml
    with:
      platform: ios
      variant: sim-x86_64
      runner: macos-14
      build_run_id: ${{ github.event.workflow_run.id }}
      test_mode: macho-header
      lib_glob: "*.dylib"

  # ===========================================================================
  # REPORT — collect all 29 variant_status outputs into one summary table
  # ===========================================================================

  report:
    name: Test report
    if: always()
    needs:
      - win_x86_64_msvc
      - win_x86_msvc
      - win_arm64_msvc
      - win_x86_64_mingw
      - win_x86_mingw
      - win_armv7_msvc
      - linux_glibc_x86_64
      - linux_glibc_x86
      - linux_glibc_arm64
      - linux_glibc_armv7
      - linux_glibc_riscv64
      - linux_glibc_s390x
      - linux_glibc_ppc64le
      - linux_glibc_loongarch64
      - linux_musl_x86_64
      - linux_musl_arm64
      - linux_musl_armv7
      - macos_x86_64
      - macos_arm64
      - macos_universal
      - wasm_emscripten
      - wasm_wasi
      - android_arm64_v8a
      - android_armeabi_v7a
      - android_x86_64
      - android_x86
      - ios_device_arm64
      - ios_sim_arm64
      - ios_sim_x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Write combined summary
        shell: bash
        env:
          R_WIN_X64_MSVC:  ${{ needs.win_x86_64_msvc.outputs.variant_status }}
          R_WIN_X86_MSVC:  ${{ needs.win_x86_msvc.outputs.variant_status }}
          R_WIN_A64_MSVC:  ${{ needs.win_arm64_msvc.outputs.variant_status }}
          R_WIN_X64_MGW:   ${{ needs.win_x86_64_mingw.outputs.variant_status }}
          R_WIN_X86_MGW:   ${{ needs.win_x86_mingw.outputs.variant_status }}
          R_WIN_AV7_MSVC:  ${{ needs.win_armv7_msvc.outputs.variant_status }}
          R_GLI_X64:       ${{ needs.linux_glibc_x86_64.outputs.variant_status }}
          R_GLI_X86:       ${{ needs.linux_glibc_x86.outputs.variant_status }}
          R_GLI_A64:       ${{ needs.linux_glibc_arm64.outputs.variant_status }}
          R_GLI_AV7:       ${{ needs.linux_glibc_armv7.outputs.variant_status }}
          R_GLI_RV64:      ${{ needs.linux_glibc_riscv64.outputs.variant_status }}
          R_GLI_S390:      ${{ needs.linux_glibc_s390x.outputs.variant_status }}
          R_GLI_PPC:       ${{ needs.linux_glibc_ppc64le.outputs.variant_status }}
          R_GLI_LOONG:     ${{ needs.linux_glibc_loongarch64.outputs.variant_status }}
          R_MUS_X64:       ${{ needs.linux_musl_x86_64.outputs.variant_status }}
          R_MUS_A64:       ${{ needs.linux_musl_arm64.outputs.variant_status }}
          R_MUS_AV7:       ${{ needs.linux_musl_armv7.outputs.variant_status }}
          R_MAC_X64:       ${{ needs.macos_x86_64.outputs.variant_status }}
          R_MAC_A64:       ${{ needs.macos_arm64.outputs.variant_status }}
          R_MAC_UNI:       ${{ needs.macos_universal.outputs.variant_status }}
          R_WASM_EM:       ${{ needs.wasm_emscripten.outputs.variant_status }}
          R_WASM_WASI:     ${{ needs.wasm_wasi.outputs.variant_status }}
          R_AND_A64:       ${{ needs.android_arm64_v8a.outputs.variant_status }}
          R_AND_AV7:       ${{ needs.android_armeabi_v7a.outputs.variant_status }}
          R_AND_X64:       ${{ needs.android_x86_64.outputs.variant_status }}
          R_AND_X86:       ${{ needs.android_x86.outputs.variant_status }}
          R_IOS_DEV:       ${{ needs.ios_device_arm64.outputs.variant_status }}
          R_IOS_SIM_A64:   ${{ needs.ios_sim_arm64.outputs.variant_status }}
          R_IOS_SIM_X64:   ${{ needs.ios_sim_x86_64.outputs.variant_status }}
        run: |
          {
            echo "## Test suite — all 29 variants"
            echo
            echo "| Group | Variant | Status |"
            echo "|-------|---------|--------|"
            echo "| Windows     | x86_64-msvc    | ${R_WIN_X64_MSVC} |"
            echo "| Windows     | x86-msvc       | ${R_WIN_X86_MSVC} |"
            echo "| Windows     | arm64-msvc     | ${R_WIN_A64_MSVC} |"
            echo "| Windows     | x86_64-mingw   | ${R_WIN_X64_MGW}  |"
            echo "| Windows     | x86-mingw      | ${R_WIN_X86_MGW}  |"
            echo "| Windows     | armv7-msvc     | ${R_WIN_AV7_MSVC} |"
            echo "| linux-glibc | x86_64         | ${R_GLI_X64}   |"
            echo "| linux-glibc | x86            | ${R_GLI_X86}   |"
            echo "| linux-glibc | arm64          | ${R_GLI_A64}   |"
            echo "| linux-glibc | armv7          | ${R_GLI_AV7}   |"
            echo "| linux-glibc | riscv64        | ${R_GLI_RV64}  |"
            echo "| linux-glibc | s390x          | ${R_GLI_S390}  |"
            echo "| linux-glibc | ppc64le        | ${R_GLI_PPC}   |"
            echo "| linux-glibc | loongarch64    | ${R_GLI_LOONG} |"
            echo "| linux-musl  | x86_64         | ${R_MUS_X64}   |"
            echo "| linux-musl  | arm64          | ${R_MUS_A64}   |"
            echo "| linux-musl  | armv7          | ${R_MUS_AV7}   |"
            echo "| macOS       | x86_64         | ${R_MAC_X64}   |"
            echo "| macOS       | arm64          | ${R_MAC_A64}   |"
            echo "| macOS       | universal      | ${R_MAC_UNI}   |"
            echo "| WASM        | emscripten     | ${R_WASM_EM}   |"
            echo "| WASM        | wasi           | ${R_WASM_WASI} |"
            echo "| Android     | arm64-v8a      | ${R_AND_A64}   |"
            echo "| Android     | armeabi-v7a    | ${R_AND_AV7}   |"
            echo "| Android     | x86_64         | ${R_AND_X64}   |"
            echo "| Android     | x86            | ${R_AND_X86}   |"
            echo "| iOS         | device-arm64   | ${R_IOS_DEV}      |"
            echo "| iOS         | sim-arm64      | ${R_IOS_SIM_A64}  |"
            echo "| iOS         | sim-x86_64     | ${R_IOS_SIM_X64}  |"
          } >> "${GITHUB_STEP_SUMMARY}"
