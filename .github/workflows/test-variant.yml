name: Test Variant

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      variant:
        required: true
        type: string
      runner:
        required: true
        type: string
      build_run_id:
        required: false
        type: string
        default: ""
        description: "Run ID of the build.yml run that produced the artifact"
      test_mode:
        required: false
        type: string
        default: "kat"
        description: "kat | pe-header | macho-header | wasm-node | wasm-wasi"
      lib_glob:
        required: false
        type: string
        default: "*.so"
        description: "Glob passed to find for the built library inside the artifact"
      qemu_arch:
        required: false
        type: string
        default: ""
        description: "QEMU arch name to enable via update-binfmts"
      qemu_ld_prefix:
        required: false
        type: string
        default: ""
        description: "QEMU_LD_PREFIX path for cross-arch glibc libraries"
      apt_packages:
        required: false
        type: string
        default: ""
        description: "Extra space-separated apt packages to install before the test"
      should_test:
        required: false
        type: boolean
        default: true
        description: "Set false to record a skipped entry and stop the queue"
      blocked_by:
        required: false
        type: string
        default: ""
      blocked_status:
        required: false
        type: string
        default: ""
    outputs:
      continue_queue:
        description: Whether the next variant in this platform queue should run.
        value: ${{ jobs.test.outputs.continue_queue }}
      variant_status:
        description: Final status recorded for this visible variant job.
        value: ${{ jobs.test.outputs.variant_status }}
      blocking_variant:
        description: The variant that closed this platform queue.
        value: ${{ jobs.test.outputs.blocking_variant }}
      blocking_status:
        description: The status of the variant that closed this platform queue.
        value: ${{ jobs.test.outputs.blocking_status }}

jobs:
  test:
    name: ${{ inputs.platform }} / ${{ inputs.variant }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    outputs:
      continue_queue: ${{ steps.queue.outputs.continue_queue }}
      variant_status: ${{ steps.queue.outputs.variant_status }}
      blocking_variant: ${{ steps.queue.outputs.blocking_variant }}
      blocking_status: ${{ steps.queue.outputs.blocking_status }}

    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 25
        with:
          fetch-depth: 1

      - name: Install QEMU and apt prerequisites
        timeout-minutes: 25
        if: ${{ inputs.should_test && (inputs.qemu_arch != '' || inputs.apt_packages != '') }}
        shell: bash
        run: |
          set -euo pipefail
          pkgs=()
          if [ -n "${{ inputs.qemu_arch }}" ]; then
            pkgs+=(qemu-user-static)
          fi
          extra="${{ inputs.apt_packages }}"
          if [ -n "${extra}" ]; then
            for p in ${extra}; do pkgs+=("${p}"); done
          fi
          if [ ${#pkgs[@]} -gt 0 ]; then
            sudo apt-get update -q
            sudo apt-get install -y "${pkgs[@]}"
          fi
          if [ -n "${{ inputs.qemu_arch }}" ]; then
            sudo update-binfmts --enable "qemu-${{ inputs.qemu_arch }}" || true
          fi

      - name: Setup Node.js (WASM emscripten)
        timeout-minutes: 25
        if: ${{ inputs.should_test && inputs.test_mode == 'wasm-node' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wasmtime (WASM WASI)
        timeout-minutes: 25
        if: ${{ inputs.should_test && inputs.test_mode == 'wasm-wasi' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "${HOME}/.wasmtime/bin" >> "${GITHUB_PATH}"

      # Create log directory unconditionally — must exist before download so
      # upload always finds something even on download failure.
      - name: Create log directory
        timeout-minutes: 5
        if: always()
        shell: bash
        run: mkdir -p "logs/test/${{ inputs.platform }}/${{ inputs.variant }}"

      - name: Download build artifact
        id: download
        timeout-minutes: 25
        if: ${{ inputs.should_test }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          run_id: ${{ inputs.build_run_id }}
          workflow_conclusion: success
          name: nextssl__${{ inputs.platform }}__${{ inputs.variant }}
          path: _art
          if_no_artifact_found: warn

      - name: Run test
        id: run_test
        timeout-minutes: 25
        if: ${{ inputs.should_test }}
        continue-on-error: true
        shell: bash
        env:
          LOG_DIR: logs/test/${{ inputs.platform }}/${{ inputs.variant }}
          LIB_GLOB: ${{ inputs.lib_glob }}
          TEST_MODE: ${{ inputs.test_mode }}
          LD_PREFIX: ${{ inputs.qemu_ld_prefix }}
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
        run: |
          set -euo pipefail

          lib_file=$(find _art -name "${LIB_GLOB}" 2>/dev/null | head -1)
          if [ -z "${lib_file}" ]; then
            echo "SKIP: no artifact matching '${LIB_GLOB}' (download: ${DOWNLOAD_OUTCOME})" \
              | tee "${LOG_DIR}/kat.log"
            exit 1
          fi

          python_cmd=python3
          if [ "${RUNNER_OS}" = "Windows" ]; then python_cmd=python; fi

          case "${TEST_MODE}" in
            kat)
              if [ -n "${LD_PREFIX}" ]; then
                QEMU_LD_PREFIX="${LD_PREFIX}" \
                  "${python_cmd}" test/run_tests.py --lib "${lib_file}" --verbose \
                  2>&1 | tee "${LOG_DIR}/kat.log"
              else
                "${python_cmd}" test/run_tests.py --lib "${lib_file}" --verbose \
                  2>&1 | tee "${LOG_DIR}/kat.log"
              fi
              ;;

            wasm-node)
              "${python_cmd}" test/run_tests.py --wasm "${lib_file}" --group hash --verbose \
                2>&1 | tee "${LOG_DIR}/kat.log"
              ;;

            wasm-wasi)
              "${python_cmd}" test/run_tests.py --wasm-wasi "${lib_file}" --group hash --verbose \
                2>&1 | tee "${LOG_DIR}/kat.log"
              ;;

            pe-header)
              _LIB="${lib_file}" "${python_cmd}" -c \
                'import os; from pathlib import Path; p=Path(os.environ["_LIB"]); assert p.exists() and p.stat().st_size>0, "missing: "+str(p); m=p.read_bytes()[:2]; assert m==b"MZ", "Not PE: "+m.hex(); print("OK PE (exec skipped):", p.name)' \
                2>&1 | tee "${LOG_DIR}/header.log"
              ;;

            macho-header)
              _LIB="${lib_file}" "${python_cmd}" -c \
                'import os; from pathlib import Path; p=Path(os.environ["_LIB"]); assert p.exists() and p.stat().st_size>0, "missing: "+str(p); m=p.read_bytes()[:4]; ok=m in {bytes.fromhex(h) for h in ["cafebabe","cefaedfe","cffaedfe","bebafeca","feedface","feedfacf"]}; assert ok, "Not Mach-O: "+m.hex(); print("OK Mach-O (exec skipped):", p.name)' \
                2>&1 | tee "${LOG_DIR}/header.log"
              ;;

            *)
              echo "Unknown test_mode: ${TEST_MODE}" | tee "${LOG_DIR}/kat.log"
              exit 1
              ;;
          esac

      - name: Record skipped variant
        timeout-minutes: 5
        if: ${{ !inputs.should_test }}
        shell: bash
        env:
          CI_BLOCKED_BY: ${{ inputs.blocked_by }}
          CI_BLOCKED_STATUS: ${{ inputs.blocked_status }}
        run: |
          set -euo pipefail
          log_dir="logs/test/${{ inputs.platform }}/${{ inputs.variant }}"
          {
            echo "status: skipped"
            echo "platform: ${{ inputs.platform }}"
            echo "variant: ${{ inputs.variant }}"
            echo "reason: queue stopped after ${CI_BLOCKED_BY:-an earlier variant} (${CI_BLOCKED_STATUS:-blocked})"
          } > "${log_dir}/result.txt"
          echo "Skipped: queue stopped after ${CI_BLOCKED_BY:-an earlier variant}"

      - name: Set queue outputs
        id: queue
        timeout-minutes: 5
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          blocking_variant="${{ inputs.variant }}"
          blocking_status="success"

          if [ "${{ inputs.should_test }}" != "true" ]; then
            continue_queue=false
            variant_status=skipped
            blocking_variant="${{ inputs.blocked_by }}"
            blocking_status="${{ inputs.blocked_status }}"
            if [ -z "${blocking_variant}" ]; then
              blocking_variant="${{ inputs.variant }}"
            fi
            if [ -z "${blocking_status}" ]; then
              blocking_status=blocked
            fi
          elif [ "${{ steps.run_test.outcome }}" = "success" ]; then
            continue_queue=true
            variant_status=success
          else
            continue_queue=false
            variant_status=failed
            blocking_status=failed
          fi

          {
            echo "continue_queue=${continue_queue}"
            echo "variant_status=${variant_status}"
            echo "blocking_variant=${blocking_variant}"
            echo "blocking_status=${blocking_status}"
          } >> "${GITHUB_OUTPUT}"

          if [ "${{ inputs.should_test }}" = "true" ]; then
            log_dir="logs/test/${{ inputs.platform }}/${{ inputs.variant }}"
            {
              echo "status: ${variant_status}"
              echo "platform: ${{ inputs.platform }}"
              echo "variant: ${{ inputs.variant }}"
              echo "download: ${{ steps.download.outcome }}"
              echo "run_test: ${{ steps.run_test.outcome }}"
            } > "${log_dir}/result.txt"
          fi

      - name: Upload logs
        timeout-minutes: 25
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs__test__${{ inputs.platform }}__${{ inputs.variant }}
          path: logs/test/${{ inputs.platform }}/${{ inputs.variant }}/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail job when test failed
        timeout-minutes: 5
        if: ${{ inputs.should_test && steps.run_test.outcome == 'failure' }}
        shell: bash
        run: exit 1
