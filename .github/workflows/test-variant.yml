name: Test Variant

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      variant:
        required: true
        type: string
      runner:
        required: true
        type: string
      build_run_id:
        required: false
        type: string
        default: ""
        description: "Run ID of the build.yml run that produced the artifact (leave empty to search latest successful run)"
      test_mode:
        required: false
        type: string
        default: "kat"
        description: "kat | pe-header | macho-header | wasm-node | wasm-wasi"
      lib_glob:
        required: false
        type: string
        default: "*.so"
        description: "Glob passed to find for the built library inside the artifact"
      qemu_arch:
        required: false
        type: string
        default: ""
        description: "QEMU arch name to enable via update-binfmts (e.g. aarch64, arm, riscv64, s390x, ppc64le, loongarch64)"
      qemu_ld_prefix:
        required: false
        type: string
        default: ""
        description: "QEMU_LD_PREFIX path for cross-arch glibc libraries"
      apt_packages:
        required: false
        type: string
        default: ""
        description: "Extra space-separated apt packages to install before the test"
    outputs:
      variant_status:
        description: "success | failed | skipped"
        value: ${{ jobs.test.outputs.variant_status }}

jobs:
  test:
    name: ${{ inputs.platform }} / ${{ inputs.variant }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    outputs:
      variant_status: ${{ steps.record.outputs.variant_status }}

    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 25
        with:
          fetch-depth: 1

      # -------------------------------------------------------------------------
      # Install runtime prerequisites (QEMU, cross-arch libs, musl tools, etc.)
      # -------------------------------------------------------------------------

      - name: Install QEMU and apt prerequisites
        timeout-minutes: 25
        if: ${{ inputs.qemu_arch != '' || inputs.apt_packages != '' }}
        shell: bash
        run: |
          set -euo pipefail
          pkgs=()
          if [ -n "${{ inputs.qemu_arch }}" ]; then
            pkgs+=(qemu-user-static)
          fi
          extra="${{ inputs.apt_packages }}"
          if [ -n "${extra}" ]; then
            for p in ${extra}; do pkgs+=("${p}"); done
          fi
          if [ ${#pkgs[@]} -gt 0 ]; then
            sudo apt-get update -q
            sudo apt-get install -y "${pkgs[@]}"
          fi
          if [ -n "${{ inputs.qemu_arch }}" ]; then
            sudo update-binfmts --enable "qemu-${{ inputs.qemu_arch }}" || true
          fi

      - name: Setup Node.js (WASM emscripten)
        timeout-minutes: 25
        if: ${{ inputs.test_mode == 'wasm-node' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wasmtime (WASM WASI)
        timeout-minutes: 25
        if: ${{ inputs.test_mode == 'wasm-wasi' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "${HOME}/.wasmtime/bin" >> "${GITHUB_PATH}"

      # -------------------------------------------------------------------------
      # Create the log directory unconditionally — must happen before download
      # so the upload step always finds something even on download failure.
      # -------------------------------------------------------------------------

      - name: Create log directory
        timeout-minutes: 5
        if: always()
        shell: bash
        run: mkdir -p "logs/test/${{ inputs.platform }}/${{ inputs.variant }}"

      # -------------------------------------------------------------------------
      # Download the build artifact produced by build.yml.
      # continue-on-error so missing artifacts don't skip the upload/record steps.
      # -------------------------------------------------------------------------

      - name: Download build artifact
        id: download
        timeout-minutes: 25
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          run_id: ${{ inputs.build_run_id }}
          workflow_conclusion: success
          name: nextssl__${{ inputs.platform }}__${{ inputs.variant }}
          path: _art
          if_no_artifact_found: warn

      # -------------------------------------------------------------------------
      # Run the test.  continue-on-error keeps record/upload alive on failure.
      # Log output is tee'd into the log directory so it is always captured.
      # -------------------------------------------------------------------------

      - name: Run test
        id: run_test
        timeout-minutes: 25
        continue-on-error: true
        shell: bash
        env:
          LOG_DIR: logs/test/${{ inputs.platform }}/${{ inputs.variant }}
          LIB_GLOB: ${{ inputs.lib_glob }}
          TEST_MODE: ${{ inputs.test_mode }}
          LD_PREFIX: ${{ inputs.qemu_ld_prefix }}
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
        run: |
          set -euo pipefail

          lib_file=$(find _art -name "${LIB_GLOB}" 2>/dev/null | head -1)
          if [ -z "${lib_file}" ]; then
            echo "SKIP: no artifact matching '${LIB_GLOB}' (download: ${DOWNLOAD_OUTCOME})" \
              | tee "${LOG_DIR}/kat.log"
            exit 1
          fi

          python_cmd=python3
          if [ "${RUNNER_OS}" = "Windows" ]; then python_cmd=python; fi

          case "${TEST_MODE}" in
            kat)
              if [ -n "${LD_PREFIX}" ]; then
                QEMU_LD_PREFIX="${LD_PREFIX}" \
                  "${python_cmd}" test/run_tests.py --lib "${lib_file}" --verbose \
                  2>&1 | tee "${LOG_DIR}/kat.log"
              else
                "${python_cmd}" test/run_tests.py --lib "${lib_file}" --verbose \
                  2>&1 | tee "${LOG_DIR}/kat.log"
              fi
              ;;

            wasm-node)
              "${python_cmd}" test/run_tests.py --wasm "${lib_file}" --group hash --verbose \
                2>&1 | tee "${LOG_DIR}/kat.log"
              ;;

            wasm-wasi)
              "${python_cmd}" test/run_tests.py --wasm-wasi "${lib_file}" --group hash --verbose \
                2>&1 | tee "${LOG_DIR}/kat.log"
              ;;

            pe-header)
              export _CHECK_LIB="${lib_file}"
              "${python_cmd}" -c '
import os, sys
from pathlib import Path
p = Path(os.environ["_CHECK_LIB"])
assert p.exists() and p.stat().st_size > 0, "File missing or empty: " + str(p)
magic = p.read_bytes()[:2]
assert magic == b"MZ", "Not PE (MZ): got " + magic.hex()
print("OK PE (execution skipped on this runner):", p.name)
' 2>&1 | tee "${LOG_DIR}/header.log"
              ;;

            macho-header)
              export _CHECK_LIB="${lib_file}"
              "${python_cmd}" -c '
import os
from pathlib import Path
p = Path(os.environ["_CHECK_LIB"])
assert p.exists() and p.stat().st_size > 0, "File missing or empty: " + str(p)
magic = p.read_bytes()[:4]
fat = b"\xca\xfe\xba\xbe"
m64 = b"\xcf\xfa\xed\xfe"
m32 = b"\xce\xfa\xed\xfe"
assert magic in (fat, m64, m32, fat[::-1], m64[::-1], m32[::-1]), "Not Mach-O: " + magic.hex()
print("OK Mach-O (execution skipped):", p.name)
' 2>&1 | tee "${LOG_DIR}/header.log"
              ;;

            *)
              echo "Unknown test_mode: ${TEST_MODE}" | tee "${LOG_DIR}/kat.log"
              exit 1
              ;;
          esac

      # -------------------------------------------------------------------------
      # Record result — mirrors ci_runner.py's result.txt so ci_merge_logs.py
      # can produce per-platform SUMMARY.txt files.
      # -------------------------------------------------------------------------

      - name: Record result
        id: record
        timeout-minutes: 5
        if: always()
        shell: bash
        run: |
          log_dir="logs/test/${{ inputs.platform }}/${{ inputs.variant }}"
          mkdir -p "${log_dir}"

          outcome="${{ steps.run_test.outcome }}"
          case "${outcome}" in
            success) status=success ;;
            skipped) status=skipped ;;
            *)        status=failed  ;;
          esac

          {
            echo "status: ${status}"
            echo "platform: ${{ inputs.platform }}"
            echo "variant: ${{ inputs.variant }}"
            echo "download: ${{ steps.download.outcome }}"
            echo "run_test: ${outcome}"
          } > "${log_dir}/result.txt"

          echo "variant_status=${status}" >> "${GITHUB_OUTPUT}"

      # -------------------------------------------------------------------------
      # Upload logs — always, even when cancelled, matching build-variant.yml.
      # -------------------------------------------------------------------------

      - name: Upload logs
        timeout-minutes: 25
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs__test__${{ inputs.platform }}__${{ inputs.variant }}
          path: logs/test/${{ inputs.platform }}/${{ inputs.variant }}/
          retention-days: 30
          if-no-files-found: warn

      # -------------------------------------------------------------------------
      # Fail the job explicitly — same pattern as build-variant.yml's
      # "Fail job when build failed" step.
      # -------------------------------------------------------------------------

      - name: Fail job when test failed
        timeout-minutes: 5
        if: ${{ steps.run_test.outcome == 'failure' }}
        shell: bash
        run: exit 1
