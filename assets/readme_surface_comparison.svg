<!-- Graph text uses Roboto Mono. Palette: warm dark + muted teal. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="NextSSL planned algorithm surface comparison">
  <rect width="1100" height="500" rx="12" fill="#181715"/>
  <rect x="1.5" y="1.5" width="1097" height="497" rx="12" fill="none" stroke="#5db8a6" stroke-width="3"/>
  <text x="56" y="58" fill="#faf9f5" font-family="Roboto Mono, monospace" font-size="30" font-weight="800">Planned algorithm surfaces</text>
  <text x="56" y="92" fill="#cdebe6" font-family="Roboto Mono, monospace" font-size="17" font-weight="600">Counts are from ALGO.md and include planned NEW surfaces.</text>
  <line x1="260" y1="126" x2="260" y2="450" stroke="#5db8a6" stroke-width="3"/>

  <g font-family="Roboto Mono, monospace" font-size="18" font-weight="700">
    <text x="56" y="154" fill="#faf9f5">Modern</text>
    <rect x="260" y="136" width="690" height="26" rx="4" fill="#5db8a6"/><text x="970" y="156" fill="#faf9f5" font-weight="900">84</text>

    <text x="56" y="194" fill="#faf9f5">Hash / KDF-hash</text>
    <rect x="260" y="176" width="485" height="26" rx="4" fill="#6fbfb3"/><text x="765" y="196" fill="#faf9f5" font-weight="900">59</text>

    <text x="56" y="234" fill="#faf9f5">PQC</text>
    <rect x="260" y="216" width="337" height="26" rx="4" fill="#8fcfc6"/><text x="617" y="236" fill="#faf9f5" font-weight="900">41</text>

    <text x="56" y="274" fill="#faf9f5">Threshold</text>
    <rect x="260" y="256" width="296" height="26" rx="4" fill="#4f9f91"/><text x="576" y="276" fill="#faf9f5" font-weight="900">36</text>

    <text x="56" y="314" fill="#faf9f5">Encoding</text>
    <rect x="260" y="296" width="115" height="26" rx="4" fill="#79c8bd"/><text x="395" y="316" fill="#faf9f5" font-weight="900">14</text>

    <text x="56" y="354" fill="#faf9f5">Ascon</text>
    <rect x="260" y="336" width="58" height="26" rx="4" fill="#8fcfc6"/><text x="338" y="356" fill="#faf9f5" font-weight="900">7</text>

    <text x="56" y="394" fill="#faf9f5">DRBG / RNG</text>
    <rect x="260" y="376" width="58" height="26" rx="4" fill="#a8d9d1"/><text x="338" y="396" fill="#faf9f5" font-weight="900">7</text>

    <text x="56" y="434" fill="#faf9f5">Stateful HBS</text>
    <rect x="260" y="416" width="22" height="26" rx="4" fill="#cdebe6"/><text x="302" y="436" fill="#faf9f5" font-weight="900">2</text>
  </g>
</svg>
