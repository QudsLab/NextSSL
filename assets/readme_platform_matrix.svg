<!-- Graph text uses Roboto Mono. Palette: warm dark + muted teal. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-label="NextSSL platform and architecture build matrix">
  <rect width="1100" height="420" rx="12" fill="#181715"/>
  <rect x="1.5" y="1.5" width="1097" height="417" rx="12" fill="none" stroke="#5db8a6" stroke-width="3"/>
  <text x="56" y="60" fill="#faf9f5" font-family="Roboto Mono, monospace" font-size="30" font-weight="800">Current build target matrix</text>
  <text x="56" y="96" fill="#cdebe6" font-family="Roboto Mono, monospace" font-size="17" font-weight="600">29 target variants are present in the current bin tree.</text>

  <g font-family="Roboto Mono, monospace">
    <g font-size="18" font-weight="800" fill="#faf9f5">
      <text x="90" y="155">Android</text><text x="340" y="155">iOS</text><text x="590" y="155">Linux glibc</text><text x="840" y="155">Linux musl</text>
      <text x="90" y="285">macOS</text><text x="340" y="285">WASM</text><text x="590" y="285">Windows</text><text x="840" y="285">Total</text>
    </g>
    <g fill="#252320" stroke="#5db8a6" stroke-width="3">
      <rect x="70" y="174" width="190" height="58" rx="7"/><rect x="320" y="174" width="190" height="58" rx="7"/>
      <rect x="570" y="174" width="190" height="58" rx="7"/><rect x="820" y="174" width="190" height="58" rx="7"/>
      <rect x="70" y="304" width="190" height="58" rx="7"/><rect x="320" y="304" width="190" height="58" rx="7"/>
      <rect x="570" y="304" width="190" height="58" rx="7"/><rect x="820" y="304" width="190" height="58" rx="7"/>
    </g>
    <g font-size="32" font-weight="900" fill="#cdebe6">
      <text x="165" y="212" text-anchor="middle">4</text><text x="415" y="212" text-anchor="middle">3</text>
      <text x="665" y="212" text-anchor="middle">8</text><text x="915" y="212" text-anchor="middle">3</text>
      <text x="165" y="342" text-anchor="middle">3</text><text x="415" y="342" text-anchor="middle">2</text>
      <text x="665" y="342" text-anchor="middle">6</text><text x="915" y="342" text-anchor="middle">29</text>
    </g>
  </g>
  <text x="56" y="394" fill="#cdebe6" font-family="Roboto Mono, monospace" font-size="15" font-weight="600">Includes x86, x86_64, ARM, ARM64, RISC-V, s390x, ppc64le, loongarch64, WASI, and Emscripten targets.</text>
</svg>
