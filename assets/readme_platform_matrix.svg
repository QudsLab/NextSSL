<!-- use roboto mono for all text -->
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330" role="img" aria-label="NextSSL platform and architecture build matrix">
  <rect width="920" height="330" rx="10" fill="#202020"/>
  <rect x="1" y="1" width="918" height="328" rx="10" fill="none" stroke="#df8346"/>
  <text x="40" y="42" fill="#ffffff" font-family="Roboto Mono, monospace" font-size="22" font-weight="800">Current build target matrix</text>
  <text x="40" y="66" fill="#f1f1f1" font-family="Roboto Mono, monospace" font-size="13" font-weight="600">29 target variants are present in the current bin tree.</text>
  <g font-family="Roboto Mono, monospace">
    <g font-size="14" font-weight="800" fill="#ffffff">
      <text x="68" y="112">Android</text><text x="278" y="112">iOS</text><text x="488" y="112">Linux glibc</text><text x="698" y="112">Linux musl</text>
      <text x="68" y="217">macOS</text><text x="278" y="217">WASM</text><text x="488" y="217">Windows</text><text x="698" y="217">Total</text>
    </g>
    <g fill="#2b2b2b" stroke="#df8346" stroke-width="2">
      <rect x="52" y="126" width="160" height="46" rx="5"/><rect x="262" y="126" width="160" height="46" rx="5"/>
      <rect x="472" y="126" width="160" height="46" rx="5"/><rect x="682" y="126" width="160" height="46" rx="5"/>
      <rect x="52" y="231" width="160" height="46" rx="5"/><rect x="262" y="231" width="160" height="46" rx="5"/>
      <rect x="472" y="231" width="160" height="46" rx="5"/><rect x="682" y="231" width="160" height="46" rx="5"/>
    </g>
    <g font-size="25" font-weight="900" fill="#7dd3fc">
      <text x="132" y="157" text-anchor="middle">4</text><text x="342" y="157" text-anchor="middle">3</text>
      <text x="552" y="157" text-anchor="middle">8</text><text x="762" y="157" text-anchor="middle">3</text>
      <text x="132" y="262" text-anchor="middle">3</text><text x="342" y="262" text-anchor="middle">2</text>
      <text x="552" y="262" text-anchor="middle">6</text><text x="762" y="262" text-anchor="middle">29</text>
    </g>
  </g>
  <text x="40" y="306" fill="#ffffff" font-family="Roboto Mono, monospace" font-size="12" font-weight="600">Includes x86, x86_64, ARM, ARM64, RISC-V, s390x, ppc64le, loongarch64, WASI, and Emscripten targets.</text>
</svg>
