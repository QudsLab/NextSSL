      <text x="68" y="112">Android</text><text x="278" y="112">iOS</text><text x="488" y="112">Linux glibc</text><text x="698" y="112">Linux musl</text>
      <text x="68" y="217">macOS</text><text x="278" y="217">WASM</text><text x="488" y="217">Windows</text><text x="698" y="217">Total</text>
    </g>
    <g fill="#f6f8fa" stroke="#d0d7de">
      <rect x="52" y="126" width="160" height="46" rx="4"/><rect x="262" y="126" width="160" height="46" rx="4"/>
      <rect x="472" y="126" width="160" height="46" rx="4"/><rect x="682" y="126" width="160" height="46" rx="4"/>
      <rect x="52" y="231" width="160" height="46" rx="4"/><rect x="262" y="231" width="160" height="46" rx="4"/>
      <rect x="472" y="231" width="160" height="46" rx="4"/><rect x="682" y="231" width="160" height="46" rx="4"/>
    </g>
    <g font-size="24" font-weight="700" fill="#0969da">
      <text x="132" y="157" text-anchor="middle">4</text><text x="342" y="157" text-anchor="middle">3</text>
      <text x="552" y="157" text-anchor="middle">8</text><text x="762" y="157" text-anchor="middle">3</text>
      <text x="132" y="262" text-anchor="middle">3</text><text x="342" y="262" text-anchor="middle">2</text>
      <text x="552" y="262" text-anchor="middle">6</text><text x="762" y="262" text-anchor="middle">29</text>
    </g>
  </g>
  <text x="40" y="306" fill="#57606a" font-family="Segoe UI, Arial, sans-serif" font-size="12">Includes x86, x86_64, ARM, ARM64, RISC-V, s390x, ppc64le, loongarch64, WASI, and Emscripten targets.</text>
</svg>
